<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجبل الثلجي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505; /* لون خلفية أسود عميق جداً */
            --primary-color: #E50914; /* أحمر سينمائي */
            --text-light: #ffffff;
            --text-muted: #8c8c8c;
            --card-bg: #121212;
            --player-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif; /* تطبيق الخط الجديد */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- قسم البوستر (Hero) --- */
        .hero {
            position: relative;
            width: 100%;
            height: 70vh;
            background: url('https://i.top4top.io/p_3762hs9kv1.jpg') center/cover no-repeat;
            display: flex;
            align-items: flex-end;
            padding: 2rem 5%;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color) 0%, rgba(5,5,5,0.7) 40%, rgba(5,5,5,0.2) 100%);
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, var(--bg-color) 0%, transparent 60%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            padding-bottom: 2rem;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .meta-info {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1rem;
            font-weight: 600;
            align-items: center;
        }

        .badge {
            background: rgba(229, 9, 20, 0.2);
            color: var(--primary-color);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--primary-color);
        }

        .play-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.05);
            background-color: #ff0a16;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.6);
        }

        /* --- المشغل المخصص (Custom Video Player) --- */
        .player-wrapper {
            width: 90%;
            max-width: 1100px;
            margin: -60px auto 40px;
            position: relative;
            z-index: 20;
            border-radius: 12px;
            background: var(--player-bg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: none; /* مخفي في البداية */
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* واجهة تحكم المشغل */
        .controls-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 1;
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .controls-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* الشريط العلوي للمشغل */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .player-title-area {
            text-align: right;
        }
        
        .player-series-name { font-size: 1.4rem; font-weight: 800; }
        .player-ep-name { font-size: 1rem; color: #ccc; }

        .top-icons {
            display: flex;
            gap: 15px;
        }
        
        .icon-btn {
            background: none; border: none; color: white;
            cursor: pointer; padding: 5px; opacity: 0.8; transition: 0.3s;
        }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* الأزرار الوسطى للمشغل */
        .center-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .center-btn {
            background: none; border: none; color: white;
            cursor: pointer; opacity: 0.8; transition: 0.2s;
        }
        .center-btn:hover { opacity: 1; transform: scale(1.1); }
        .center-btn svg { width: 35px; height: 35px; fill: currentColor; }

        .play-pause-btn {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            position: relative;
        }
        /* التأثير الأحمر الاحترافي حول زر التشغيل */
        .play-pause-btn::before {
            content: '';
            position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            border-top-color: transparent; border-right-color: transparent;
            transform: rotate(-45deg);
        }
        .play-pause-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(229,9,20,0.5);
            background: rgba(229,9,20,0.1);
        }
        .play-pause-btn svg { width: 30px; height: 30px; fill: white; }

        /* الشريط السفلي للمشغل */
        .bottom-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .time-text { font-size: 0.9rem; font-family: monospace; color: #ddd; }

        /* شريط التقدم الاحترافي */
        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            position: relative;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* --- قسم الحلقات --- */
        .episodes-section {
            padding: 2rem 5%;
        }

        .section-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.8rem; font-weight: 800;
            border-right: 5px solid var(--primary-color); padding-right: 15px;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .episode-card {
            background-color: var(--card-bg);
            border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
        }

        .episode-card:hover {
            transform: translateY(-5px);
            background-color: #1a1a1a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .episode-thumb {
            height: 160px;
            background: url('https://i.top4top.io/p_3762hs9kv1.jpg') center/cover;
            position: relative; filter: brightness(0.6); transition: 0.3s;
        }

        .episode-card.active { border-color: var(--primary-color); }
        .episode-card.active .episode-thumb { filter: brightness(1); }

        .episode-info { padding: 15px; }
        .episode-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
        .episode-status { font-size: 0.9rem; color: #4ade80; font-weight: 600; }
        .episode-status.upcoming { color: var(--text-muted); }

        /* رسومات SVG مدمجة */
        svg { display: inline-block; vertical-align: middle; }

    </style>
</head>
<body>

    <header class="hero">

                <span class="badge">موسم 1</span>

                <span>الحلقات المتوفرة: 3</span>

            <button class="play-btn" onclick="playEpisode(1, 'http://supaapp.xyz:8080/series/2551810583569940/2025565766597215/457188.mp4')">

    <div class="player-wrapper" id="playerWrapper">
        <div class="video-container" id="videoContainer">
            <video id="customVideo">
                <source id="videoSource" src="" type="video/mp4">
            </video>
            
            <div class="controls-overlay" id="controlsOverlay">
                
                <div class="top-controls">
                    <div class="player-title-area">
                        <div class="player-series-name">الجبل الثلجي</div>
                        <div class="player-ep-name" id="playerEpTitle">الموسم 1 الحلقة 1</div>

                    <div class="top-icons">

                            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
                        </button>

                <div class="center-controls">

                    </button>
                    
                    <button class="center-btn play-pause-btn" id="playPauseBtn">
                        <svg id="pauseIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg id="playIcon" style="display:none;" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

    <section class="episodes-section">
        <div class="section-header">
            <h2 class="section-title">الحلقات</h2>

                <div class="episode-thumb" style="filter: grayscale(1); opacity: 0.3;"></div>
                <div class="episode-info">

                    <div class="episode-status upcoming">قريباً</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const video = document.getElementById('customVideo');
        const videoSource = document.getElementById('videoSource');
        const playerWrapper = document.getElementById('playerWrapper');
        const controlsOverlay = document.getElementById('controlsOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoContainer = document.getElementById('videoContainer');
        const playerEpTitle = document.getElementById('playerEpTitle');

        let hideControlsTimeout;

        // دالة تشغيل الحلقة من القائمة
        function playEpisode(episodeNumber, url) {
            playerWrapper.style.display = 'block';
            playerEpTitle.innerText = `الموسم 1 الحلقة ${episodeNumber}`;
            videoSource.src = url;
            video.load();
            video.play();
            updatePlayPauseUI(false);
            
            // تمرير سلس للمشغل
            playerWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // تفعيل الكارد
            const cards = document.querySelectorAll('.episode-card');
            cards.forEach(card => card.classList.remove('active'));
            if(episodeNumber <= cards.length) {
                cards[episodeNumber - 1].classList.add('active');
            }
        }

        // تنسيق الوقت (دقائق:ثواني)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
        }

        // تحديث أيقونة التشغيل/الإيقاف
        function updatePlayPauseUI(isPaused) {
            if (isPaused) {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        }

        // تشغيل وإيقاف مؤقت
        playPauseBtn.addEventListener('click', () => {
            if (video.paused) { video.play(); } 
            else { video.pause(); }
        });

        video.addEventListener('play', () => updatePlayPauseUI(false));
        video.addEventListener('pause', () => updatePlayPauseUI(true));

        // النقر على الفيديو للتشغيل/الإيقاف
        video.addEventListener('click', () => {
            if (video.paused) { video.play(); } 
            else { video.pause(); }
        });

        // تقديم وتأخير 10 ثواني
        rewindBtn.addEventListener('click', () => { video.currentTime -= 10; });
        forwardBtn.addEventListener('click', () => { video.currentTime += 10; });

        // تحديث شريط التقدم والوقت
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const progressPercent = (video.currentTime / video.duration) * 100;
            progressBar.value = progressPercent;
            currentTimeEl.innerText = formatTime(video.currentTime);
            
            // تلوين الجزء المكتمل باللون الأحمر
            progressBar.style.background = `linear-gradient(to left, rgba(255,255,255,0.2) ${100 - progressPercent}%, var(--primary-color) ${100 - progressPercent}%)`;
        });

        // تحميل مدة الفيديو
        video.addEventListener('loadedmetadata', () => {
            durationTimeEl.innerText = formatTime(video.duration);
        });

        // تغيير وقت الفيديو عند سحب الشريط
        progressBar.addEventListener('input', (e) => {
            const seekTime = (e.target.value / 100) * video.duration;
            video.currentTime = seekTime;
        });

        // الشاشة الكاملة
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // إخفاء وإظهار أزرار التحكم تلقائياً
        function resetHideControlsTimer() {
            controlsOverlay.classList.remove('hide');
            clearTimeout(hideControlsTimeout);
            if (!video.paused) {
                hideControlsTimeout = setTimeout(() => {
                    controlsOverlay.classList.add('hide');
                }, 3000); // يختفي بعد 3 ثواني
            }
        }

        videoContainer.addEventListener('mousemove', resetHideControlsTimer);
        videoContainer.addEventListener('click', resetHideControlsTimer);
        videoContainer.addEventListener('mouseleave', () => {
            if (!video.paused) { controlsOverlay.classList.add('hide'); }
        });

    </script>
</body>
</html>

<script>
    const video = document.getElementById('vid');
    let channels = [];

    // سطر جلب البيانات باستخدام وسيط يكسر CORS تماماً
    async function loadData() {
        const targetUrl = "http://xlion.net:8080/player_api.php?username=hamdiusa2022&password=simosaid01&action=get_live_streams";
        const proxyUrl = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(targetUrl);

        try {
            const res = await fetch(proxyUrl);
            channels = await res.json();
            show(channels);
            document.getElementById('loading').style.display = 'none';
        } catch (err) {
            document.getElementById('loading').innerText = "فشل في جلب القنوات، يرجى تحديث الصفحة";
        }
    }

    function show(data) {
        const container = document.getElementById('list');
        container.innerHTML = '';
        data.forEach(ch => {
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<span>▶</span> ${ch.name}`;
            d.onclick = () => play(ch.stream_id, ch.name, ch.container_extension);
            container.appendChild(d);
        });
    }

    function play(id, name, ext) {
        document.getElementById('target').innerText = "بث مباشر: " + name;
        // رابط البث المباشر
        const stream = `http://xlion.net:8080/live/hamdiusa2022/simosaid01/${id}.${ext || 'ts'}`;

        if (Hls.isSupported()) {
            const hls = new Hls();
            // استخدام بروكسي للبث أيضاً لضمان التشغيل على GitHub
            hls.loadSource("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(stream));
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = stream;
        }
    }

    function searchCh() {
        const query = document.getElementById('find').value.toLowerCase();
        show(channels.filter(c => c.name.toLowerCase().includes(query)));
    }

    loadData();
</script>
