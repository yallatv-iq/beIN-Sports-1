<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشغل السينمائي النهائي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e50914; /* اللون الأساسي (أحمر سينمائي) */
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Cairo', sans-serif; /* تطبيق الخط */
            overflow: hidden;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; /* حجم مناسب للمنصات العالمية */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            aspect-ratio: 16 / 9; /* الحفاظ على أبعاد الفيديو */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ملء الشاشة باحترافية */
            cursor: pointer;
        }

        /* الشعار (اللوجو) المائي في الزاوية العلوية */
        .player-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px; /* حجم اللوجو */
            height: auto;
            opacity: 0.8;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* تأثير التعتيم العلوي والسفلي (Vignette) */
        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 15;
        }

        /* واجهة التخزين المؤقت */
        .buffering-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 30;
            pointer-events: none;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); /* توهج خرافي */
        }

        .buffering-text {
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* شريط التحكم السفلي */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 20px 20px 20px; /* مساحة علوية للتدرج */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 40;
        }

        /* إخفاء التحكم عند السكون */
        .player-wrapper.idle .controls-overlay,
        .player-wrapper.idle .player-logo {
            opacity: 0 !important;
            cursor: none;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .btn svg { width: 26px; height: 26px; fill: white; }

        /* شريط التقدم التفاعلي (Scrubbing) */
        .progress-wrapper {
            flex-grow: 1;
            margin: 0 20px;
            display: flex;
            align-items: center;
            height: 20px;
            cursor: pointer;
            position: relative;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            position: relative;
            transition: height 0.2s;
        }

        .progress-wrapper:hover .progress-track {
            height: 6px; /* يكبر عند تمرير الماوس */
        }

        .progress-filled {
            height: 100%;
            background: var(--primary-color);
            border-radius: 2px;
            width: 0%;
            position: relative;
        }

        /* نقطة شريط التقدم */
        .progress-filled::after {
            content: '';
            position: absolute;
            right: -6px; /* اتجاه اليمين لأننا RTL */
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .progress-wrapper:hover .progress-filled::after {
            transform: translateY(-50%) scale(1);
        }

        .time-text {
            color: #eee;
            font-size: 13px;
            font-weight: 600;
            direction: ltr; /* للحفاظ على تنسيق الأرقام 00:00 */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="player-wrapper" id="playerWrapper">
        
        <img src="https://via.placeholder.com/150x60/000000/FFFFFF?text=YOUR+LOGO" alt="Logo" class="player-logo">

        <div class="vignette-overlay"></div>

        <div class="buffering-overlay" id="bufferingOverlay">
            <div class="spinner"></div>
            <div class="buffering-text">جاري الاتصال...</div>
        </div>

        <video id="videoElement" muted playsinline></video>

        <div class="controls-overlay" id="controlsOverlay">
            
            <div class="control-group">
                <button class="btn" id="playPauseBtn">
                    <svg id="playIcon" class="hidden" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>

            <div class="progress-wrapper" id="progressWrapper">
                <div class="progress-track">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
            </div>

            <div class="control-group">
                <span class="time-text" id="timeText">00:00</span>

                <button class="btn" id="muteBtn">
                    <svg id="unmuteIcon" class="hidden" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="muteIcon" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM3 9v6h4l5 5V4L7 9H3zM19 12l2-2-2-2-2 2 2 2z"/></svg>
                </button>

                <button class="btn" id="fullscreenBtn">
                    <svg id="enterFullscreen" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg id="exitFullscreen" class="hidden" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const video = document.getElementById('videoElement');
        const playerWrapper = document.getElementById('playerWrapper');
        const bufferingOverlay = document.getElementById('bufferingOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFilled = document.getElementById('progressFilled');
        const timeText = document.getElementById('timeText');

        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const muteIcon = document.getElementById('muteIcon');
        const unmuteIcon = document.getElementById('unmuteIcon');
        const enterFullscreen = document.getElementById('enterFullscreen');
        const exitFullscreen = document.getElementById('exitFullscreen');

        const source = 'http://goat2027.alwanvipsaw.store:80/live/bmuser14414/C38WGv6DmJ/8.m3u8';

        // إعداد HLS
        if (Hls.isSupported()) {
            const hls = new Hls({ maxBufferLength: 40, startLevel: -1 });
            hls.attachMedia(video);
            hls.on(Hls.Events.MEDIA_ATTACHED, () => { hls.loadSource(source); });
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => console.log("تحتاج تفاعل لتشغيل الفيديو"));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source;
            video.play();
        }

        // إخفاء شريط التحكم عند السكون (لمسة المنصات العالمية)
        let hideControlsTimeout;
        const resetIdleTimer = () => {
            playerWrapper.classList.remove('idle');
            clearTimeout(hideControlsTimeout);
            hideControlsTimeout = setTimeout(() => {
                if (!video.paused) playerWrapper.classList.add('idle');
            }, 3000); // يختفي بعد 3 ثواني
        };
        playerWrapper.addEventListener('mousemove', resetIdleTimer);
        playerWrapper.addEventListener('click', resetIdleTimer);
        playerWrapper.addEventListener('mouseleave', () => {
            if (!video.paused) playerWrapper.classList.add('idle');
        });

        // التخزين المؤقت
        video.addEventListener('waiting', () => bufferingOverlay.style.display = 'flex');
        video.addEventListener('playing', () => bufferingOverlay.style.display = 'none');
        video.addEventListener('canplay', () => bufferingOverlay.style.display = 'none');

        // التشغيل والإيقاف
        const togglePlay = () => {
            if (video.paused) {
                video.play();
                playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden');
            } else {
                video.pause();
                playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden');
                playerWrapper.classList.remove('idle'); // إظهار التحكم عند الإيقاف
            }
        };
        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        // الصوت
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted) {
                muteIcon.classList.remove('hidden'); unmuteIcon.classList.add('hidden');
            } else {
                muteIcon.classList.add('hidden'); unmuteIcon.classList.remove('hidden');
            }
        });

        // التكبير (Fullscreen)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                enterFullscreen.classList.add('hidden'); exitFullscreen.classList.remove('hidden');
            } else {
                enterFullscreen.classList.remove('hidden'); exitFullscreen.classList.add('hidden');
            }
        });

        // تنسيق الوقت
        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        };

        // تحديث شريط التقدم والوقت
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                timeText.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        // تقديم وتأخير الفيديو بالضغط على الشريط
        progressWrapper.addEventListener('click', (e) => {
            const rect = progressWrapper.getBoundingClientRect();
            // بما أننا نستخدم RTL، يجب حساب الضغطة من اليمين
            const clickPos = rect.right - e.clientX; 
            const newTime = (clickPos / rect.width) * video.duration;
            video.currentTime = newTime;
        });

    </script>
</body>
</html>
