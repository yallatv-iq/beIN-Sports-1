<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشغل الذكي المتقدم</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background-color: #0b0c10; color: #c5c6c7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #fff; margin: 0; }
        .player-wrapper { width: 100%; max-width: 900px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); border: 1px solid #333; }
        .video-js { width: 100%; aspect-ratio: 16/9; height: auto; }
        .controls-container { width: 100%; max-width: 900px; margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .btn { background: #1f2833; color: #fff; border: 1px solid #45a29e; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #45a29e; color: #000; }
        .terminal { width: 100%; max-width: 900px; background: #000; color: #0f0; font-family: monospace; padding: 15px; margin-top: 20px; border-radius: 8px; height: 150px; overflow-y: auto; border: 1px solid #333; direction: ltr; text-align: left;}
        .terminal span { display: block; margin-bottom: 5px; }
        .log-error { color: #ff4d4d; }
        .log-success { color: #66fcf1; }
    </style>
</head>
<body>

    <div class="header">
        <h1>المشغل الذكي</h1>
    </div>

    <div class="player-wrapper">
        <video id="smart-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="controls-container">
        <button class="btn" onclick="processChannel('/api/proxy?id=4', 'beIN Sports 1')">beIN Sports 1</button>
        <button class="btn" onclick="processChannel('/api/proxy?id=5', 'beIN Sports 2')">beIN Sports 2</button>
    </div>

    <div class="terminal" id="terminal">
        <span>[System]: Player is ready. Waiting for commands...</span>
    </div>

    <script>
        const player = videojs('smart-player', { autoplay: true });
        const terminal = document.getElementById('terminal');

        function logMsg(msg, type = 'normal') {
            const span = document.createElement('span');
            span.innerHTML = `> ${msg}`;
            if (type === 'error') span.className = 'log-error';
            if (type === 'success') span.className = 'log-success';
            terminal.appendChild(span);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function extractStreamLink(data) {
            const possibleKeys = ['url', 'stream_url', 'link', 'source', 'm3u8_url', 'video'];
            for (let key of possibleKeys) {
                if (data[key]) return data[key];
            }
            return null;
        }

        async function processChannel(apiUrl, channelName) {
            logMsg(`[Request] Connecting to proxy for: ${channelName}...`);
            try {
                // الاتصال بملف السيرفر المصغر الخاص بك
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Proxy Server Error');
                
                const data = await response.json();
                logMsg(`[Success] Data received from bypass server.`, 'success');
                
                const streamUrl = extractStreamLink(data);
                if (streamUrl) {
                    logMsg(`[Extracted] Stream URL: ${streamUrl}`);
                    logMsg(`[Action] Playing video...`, 'success');
                    player.src({
                        src: streamUrl,
                        type: streamUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'
                    });
                    player.play();
                } else {
                    logMsg(`[Error] Link found, but stream url is missing inside data.`, 'error');
                }
            } catch (error) {
                logMsg(`[Error] ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
