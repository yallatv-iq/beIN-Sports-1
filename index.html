<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOD Pro Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/city/index.css" rel="stylesheet">

    <style>
        :root { --accent-color: #ff5500; --bg-dark: #0a0a0a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .main-container { width: 95%; max-width: 900px; }
        .header { margin-bottom: 20px; border-right: 5px solid var(--accent-color); padding-right: 15px; width: 100%; }
        .header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }

        .video-card { background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.8); border: 1px solid #222; }
        
        /*    */
        .vjs-theme-city .vjs-play-progress { background-color: var(--accent-color); }
        .vjs-theme-city .vjs-big-play-button { background-color: rgba(255, 85, 0, 0.9); width: 70px; height: 70px; border-radius: 50%; border: none; }
        
        .quality-bar { display: flex; justify-content: center; gap: 10px; margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 30px; }
        .q-btn { background: none; border: 1px solid #444; color: #aaa; padding: 8px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .q-btn:hover { color: white; border-color: var(--accent-color); }
        .q-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(255,85,0,0.4); }

        .alert-box { background: #3d1414; color: #ff9d9d; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.9rem; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>LIVE STREAM <span style="color:var(--accent-color)">PRO</span></h1>
    </div>

    <div class="video-card">
        <video id="pro-player" class="video-js vjs-theme-city vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="quality-bar" id="q-menu"></div>

    <div id="mixed-error" class="alert-box">
        :    HTTPS    HTTP.       "Insecure Content"          .
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    const config = {
        userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Safari/537.36",
        sources: [
            { label: "1080p FHD", url: "http://het000.4rouwanda-shop.store/live/918454578001/index.m3u8" },
            { label: "720p HD", url: "http://het000.4rouwanda-shop.store/live/918454578001/index.m3u8" },
            { label: "480p SD", url: "http://het000.4rouwanda-shop.store/live/978480008877005/index.m3u8" }
        ]
    };

    const player = videojs('pro-player');
    let hlsInstance = null;

    //       GitHub (HTTPS)
    if (window.location.protocol === 'https:') {
        document.getElementById('mixed-error').style.display = 'block';
    }

    function changeQuality(index) {
        const source = config.sources[index];
        
        //  
        document.querySelectorAll('.q-btn').forEach((b, i) => b.classList.toggle('active', i === index));

        if (Hls.isSupported()) {
            if (hlsInstance) hlsInstance.destroy();
            hlsInstance = new Hls();
            hlsInstance.loadSource(source.url);
            hlsInstance.attachMedia(player.el().querySelector('video'));
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => player.play());
        } else {
            player.src({ src: source.url, type: 'application/x-mpegURL' });
            player.play();
        }
    }

    //  
    const menu = document.getElementById('q-menu');
    config.sources.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = `q-btn ${i === 0 ? 'active' : ''}`;
        btn.innerText = s.label;
        btn.onclick = () => changeQuality(i);
        menu.appendChild(btn);
    });

    //  
    player.ready(() => changeQuality(0));
</script>

</body>
</html>
