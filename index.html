<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>beIN Ultra Player UI</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        :root {
            --bein-orange: #ff5500; /*   */
            --bein-purple: #4a148c; /*    */
            --glass: rgba(0, 0, 0, 0.4);
            --blur: blur(10px);
            --text: #fff;
        }

        body {
            background: #000; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; direction: ltr; /*    */
        }

        /*    -      */
        .player-wrapper {
            position: relative; width: 100%; max-width: 1200px;
            aspect-ratio: 16 / 9; border-radius: 16px; overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); border: 1px solid #1a1a1a;
        }

        /*    */
        .vjs-tech { object-fit: cover; }
        .video-js { width: 100%; height: 100%; background: #000; }

        /* ---   Video.js  --- */
        .vjs-has-started .vjs-control-bar,
        .vjs-big-play-button,
        .vjs-loading-spinner,
        .vjs-error-display { display: none !important; }

        /* ========================================= */
        /* ---  beIN  (Custom UI) --- */
        /* ========================================= */
        
        /*   (Overlay)   */
        .bein-controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            justify-content: space-between;
            color: var(--text);
            transition: opacity 0.4s ease;
            opacity: 1; /*  0  */
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.8) 100%);
        }

        .bein-controls-overlay.vjs-ad-playing,
        .bein-controls-overlay.vjs-user-inactive { opacity: 0; pointer-events: none; }

        /*   */
        .vjs-icon { font-family: VideoJS; font-weight: normal; font-style: normal; }

        /* ---   (Top Bar) --- */
        .bein-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px;
        }
        .bein-logo { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; color: rgba(255,255,255,0.9); }
        .bein-logo span { font-weight: lighter; }
        .bein-exit-btn { cursor: pointer; font-size: 1.5rem; color: rgba(255,255,255,0.6); transition: 0.2s; }
        .bein-exit-btn:hover { color: #fff; }

        /* ---   (Center Controls) --- */
        .bein-center-controls {
            display: flex; justify-content: center; align-items: center; gap: 40px;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .bein-mid-btn {
            background: none; border: none; color: rgba(255,255,255,0.8);
            font-size: 2.5rem; cursor: pointer; transition: transform 0.2s, color 0.2s;
            position: relative;
        }
        .bein-mid-btn:hover { color: #fff; transform: scale(1.1); }
        .bein-play-pause-btn { font-size: 3.5rem; color: #fff; }
        .bein-rewind-btn::after, .bein-forward-btn::after {
            content: '10'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: bold; font-family: sans-serif;
        }

        /* ---   (Bottom Bar & Progress) --- */
        .bein-bottom-area {
            display: flex; flex-direction: column; width: 100%;
            padding-bottom: 10px;
        }

        /*    (Progress Bar) */
        .bein-progress-container {
            width: calc(100% - 60px); margin: 0 30px 10px 30px; height: 10px;
            display: flex; align-items: center; cursor: pointer; position: relative;
        }
        .bein-progress-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; }
        .bein-progress-filled { height: 100%; background: var(--bein-orange); border-radius: 2px; width: 0%; position: relative; }
        /*   */
        .bein-progress-handle {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
            transition: transform 0.2s ease; box-shadow: 0 0 10px var(--bein-orange);
        }
        .bein-progress-container:hover .bein-progress-handle { transform: translateY(-50%) scale(1); }
        .bein-progress-container:hover .bein-progress-filled { height: 4px; }

        /*    (Glass Control Bar) */
        .bein-control-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; height: 40px;
        }
        .bein-bot-left, .bein-bot-right { display: flex; align-items: center; gap: 20px; }

        /*   (Live Badge) */
        .bein-live-badge {
            background: var(--bein-purple); color: #fff;
            padding: 3px 12px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold;
            display: flex; align-items: center; gap: 6px;
        }
        .bein-live-badge::before { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }

        .bein-time-display { font-size: 0.9rem; font-weight: bold; color: rgba(255,255,255,0.8); }

        .bein-bot-icon {
            font-size: 1.3rem; color: rgba(255,255,255,0.7);
            cursor: pointer; transition: 0.2s;
        }
        .bein-bot-icon:hover { color: #fff; }

        /* ---   (Floating Glass Menu) --- */
        .bein-quality-menu {
            position: absolute; bottom: 70px; right: 30px;
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 10px;
            display: none; flex-direction: column; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 140px;
            transform-origin: bottom right;
        }
        .bein-quality-menu.active { display: flex; animation: beinMenuIn 0.3s ease; }

        .bein-q-item {
            background: none; border: none; color: #fff;
            padding: 10px; text-align: center; cursor: pointer;
            font-size: 0.85rem; transition: 0.2s; border-radius: 8px;
            font-weight: 600;
        }
        .bein-q-item:hover { background: rgba(255,255,255,0.1); }
        .bein-q-item.active { background: rgba(255,85,0,0.2); color: var(--bein-orange); }

        @keyframes beinMenuIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <div class="player-wrapper">
        <video id="bein-player-core" class="video-js vjs-16-9" preload="auto">
            <source src="https://a4.kora-plus.dad/watch/b1.m3u8" type="application/x-mpegURL">
        </video>

        <div class="bein-controls-overlay" id="bein-ui">
            
            <div class="bein-top-bar">
                <div class="bein-logo">beIN <span>SPORTS</span></div>
                <div class="bein-exit-btn"></div>
            </div>

            <div class="bein-center-controls">
                <button class="bein-mid-btn bein-rewind-btn" onclick="beinRewind()"><span class="vjs-icon"></span></button>
                <button class="bein-mid-btn bein-play-pause-btn" id="bein-main-pp" onclick="beinTogglePlay()"><span class="vjs-icon"></span></button>
                <button class="bein-mid-btn bein-forward-btn" onclick="beinForward()"><span class="vjs-icon"></span></button>
            </div>

            <div class="bein-bottom-area">
                
                <div class="bein-progress-container" id="bein-progress">
                    <div class="bein-progress-bg">
                        <div class="bein-progress-filled" id="bein-filled">
                            <div class="bein-progress-handle"></div>
                        </div>
                    </div>
                </div>

                <div class="bein-control-bar">
                    <div class="bein-bot-left">
                        <div class="bein-live-badge"></div>
                        <div class="bein-time-display" id="bein-time">00:00</div>
                    </div>
                    <div class="bein-bot-right">
                        <div class="bein-bot-icon vjs-icon" id="bein-settings-icon" onclick="toggleQualityMenu()"></div>
                        <div class="bein-bot-icon vjs-icon" onclick="beinToggleFullscreen()"></div>
                    </div>
                </div>
            </div>

            <div class="bein-quality-menu" id="bein-q-menu">
                <button class="bein-q-item active" onclick="changeQuality('https://a4.kora-plus.dad/watch/b1.m3u8', this)">1080p FHD</button>
                <button class="bein-q-item" onclick="changeQuality('https://a4.kora-plus.dad/watch/b1.m3u8', this)">720p HD</button>
                <button class="bein-q-item" onclick="changeQuality('https://a4.kora-plus.dad/watch/b1.m3u8', this)">480p SD</button>
            </div>

        </div> </div> <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        //   (Core setup only, no default controls)
        const player = videojs('bein-player-core', {
            controls: false,
            fluid: true,
            userActions: { doubleClick: true }
        });

        const ui = document.getElementById('bein-ui');
        const ppBtnIcon = document.querySelector('#bein-main-pp .vjs-icon');
        const timeDisplay = document.getElementById('bein-time');
        const filledBar = document.getElementById('bein-filled');
        const progressBar = document.getElementById('bein-progress');
        const qMenu = document.getElementById('bein-q-menu');

        // ---    (Logic) ---

        // /
        function beinTogglePlay() {
            if (player.paused()) { player.play(); } else { player.paused(); }
        }

        player.on('play', () => { ppBtnIcon.innerHTML = ''; }); //  
        player.on('pause', () => { ppBtnIcon.innerHTML = ''; }); //  

        // / 10 
        function beinRewind() { player.currentTime(player.currentTime() - 10); }
        function beinForward() { player.currentTime(player.currentTime() + 10); }

        //     
        player.on('timeupdate', () => {
            const current = player.currentTime();
            const duration = player.duration();
            
            //    (MM:SS)
            if (current && duration) {
                timeDisplay.innerText = formatTime(current);
                
                //     
                const percentage = (current / duration) * 100;
                filledBar.style.width = percentage + '%';
            }
        });

        //     beIN (MM:SS)
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            seconds = Math.floor(seconds % 60);
            return (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
        }

        //       (Scrubbing)
        progressBar.addEventListener('click', (e) => {
            const pos = (e.pageX  - progressBar.offsetLeft) / progressBar.offsetWidth;
            player.currentTime(pos * player.duration());
        });

        //  
        function beinToggleFullscreen() {
            if (!player.isFullscreen()) { player.requestFullscreen(); } else { player.exitFullscreen(); }
        }

        // ---     ---
        function toggleQualityMenu() {
            qMenu.classList.toggle('active');
        }

        //     
        document.addEventListener('click', (e) => {
            if (!e.target.matches('#bein-settings-icon')) {
                qMenu.classList.remove('active');
            }
        });

        //   (   )
        let hlsObj = null;
        function changeQuality(url, btn) {
            //  
            document.querySelectorAll('.bein-q-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            qMenu.classList.remove('active');

            const currentT = player.currentTime();
            const videoTag = player.el().querySelector('video');

            if (Hls.isSupported()) {
                if (hlsObj) hlsObj.destroy();
                hlsObj = new Hls();
                hlsObj.loadSource(url);
                hlsObj.attachMedia(videoTag);
                hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.currentTime(currentT); //   
                    player.play();
                });
            } else {
                player.src({ src: url, type: 'application/x-mpegURL' });
                player.play();
            }
        }

        // ---   (Auto-hide controls) ---
        //    'vjs-user-inactive'    UI
        player.on('userinactive', () => { ui.classList.add('vjs-user-inactive'); });
        player.on('useractive', () => { ui.classList.remove('vjs-user-inactive'); });

    </script>
</body>
</html>
