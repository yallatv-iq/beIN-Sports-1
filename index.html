<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجبل الثلجي - المشغل الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --primary-color: #E50914;
            --text-light: #ffffff;
            --text-muted: #8c8c8c;
            --card-bg: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-light); overflow-x: hidden; }

        /* الهيدر والبوستر */
        .hero {
            position: relative; width: 100%; height: 60vh;
            background: url('https://i.top4top.io/p_3762hs9kv1.jpg') center/cover no-repeat;
            display: flex; align-items: flex-end; padding: 2rem 5%;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color) 0%, rgba(5,5,5,0.7) 40%, rgba(5,5,5,0.2) 100%);
        }
        .hero-content { position: relative; z-index: 10; max-width: 600px; padding-bottom: 2rem; }
        .title { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; }
        .badge { background: rgba(229, 9, 20, 0.2); color: var(--primary-color); padding: 4px 12px; border-radius: 4px; border: 1px solid var(--primary-color); font-weight: bold; margin-left: 10px; }
        .play-btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 35px; font-size: 1.1rem; font-weight: 800; border-radius: 6px; cursor: pointer; transition: 0.3s; }

        /* حاوية المشغل */
        .player-wrapper {
            width: 95%; max-width: 1000px; margin: -50px auto 40px;
            position: relative; z-index: 20; border-radius: 12px;
            background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: none; overflow: hidden;
        }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* واجهة التحكم */
        .controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; transition: opacity 0.3s ease;
            background: rgba(0,0,0,0.4);
            z-index: 30;
        }
        .controls-overlay.hide { opacity: 0; pointer-events: none; }

        /* منع اختفاء الواجهة عند النقر على الأزرار نفسها */
        .top-controls, .center-controls, .bottom-controls { pointer-events: auto; }

        .top-controls { display: flex; justify-content: space-between; align-items: center; }
        .player-series-name { font-size: 1.2rem; font-weight: 800; text-shadow: 1px 1px 3px #000; text-align: right;}
        
        .icon-btn { background: none; border: none; color: white; cursor: pointer; transition: 0.3s; }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .center-controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .center-btn { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; }
        .play-pause-btn {
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5);
        }
        .play-pause-btn:hover { border-color: var(--primary-color); }
        .play-pause-btn svg { width: 30px; height: 30px; fill: white; }
        .skip-btn svg { width: 35px; height: 35px; fill: white; }

        .bottom-controls { display: flex; align-items: center; gap: 15px; direction: ltr; }
        .time-text { font-size: 0.85rem; font-family: monospace; color: #fff; }
        
        .progress-container { flex-grow: 1; display: flex; align-items: center; }
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 3px; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 15px; height: 15px; background: var(--primary-color);
            border-radius: 50%; cursor: pointer;
        }

        /* قائمة الحلقات */
        .episodes-section { padding: 2rem 5%; }
        .section-title { font-size: 1.5rem; font-weight: 800; border-right: 5px solid var(--primary-color); padding-right: 15px; margin-bottom: 20px;}
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .episode-card { background-color: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .episode-card:hover { transform: translateY(-5px); background-color: #1a1a1a; }
        .episode-thumb { height: 140px; background: url('https://i.top4top.io/p_3762hs9kv1.jpg') center/cover; filter: brightness(0.6); }
        .episode-card.active { border-color: var(--primary-color); }
        .episode-card.active .episode-thumb { filter: brightness(1); }
        .episode-info { padding: 12px; }
        .episode-title { font-size: 1.1rem; font-weight: 700; }
        .episode-status { font-size: 0.85rem; color: #4ade80; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1 class="title">الجبل الثلجي</h1>
            <div style="margin-bottom: 20px;">
                <span class="badge">الموسم 1</span>
                <span style="color: #ccc;">مغامرة • دراما</span>
            </div>
            <button class="play-btn" onclick="playEpisode(1, 'https://vid4.zvde-dsn-05.site/Al-Gabal-Al-Thalji/01.mp4')">تشغيل الحلقة 1</button>
        </div>
    </header>

    <div class="player-wrapper" id="playerWrapper">
        <div class="video-container" id="videoContainer" onclick="handleVideoClick(event)">
            <video id="customVideo" playsinline></video>
            
            <div class="controls-overlay" id="controlsOverlay">
                <div class="top-controls">
                    <div class="top-icons">
                        <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94s-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></button>
                    </div>
                    <div class="player-title-area">
                        <div class="player-series-name">الجبل الثلجي</div>
                        <div id="playerEpTitle" class="player-ep-name" style="color: #ccc; font-size: 0.9rem;">الحلقة 1</div>
                    </div>
                </div>

                <div class="center-controls">
                    <button class="center-btn skip-btn" onclick="skip(-10, event)"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></button>
                    <button class="center-btn play-pause-btn" id="playPauseBtn" onclick="togglePlay(event)">
                        <svg id="pauseIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg id="playIcon" style="display:none;" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="center-btn skip-btn" onclick="skip(10, event)"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
                </div>

                <div class="bottom-controls">
                    <span class="time-text" id="currentTime">00:00</span>
                    <div class="progress-container">
                        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" oninput="seek(event)">
                    </div>
                    <span class="time-text" id="durationTime">00:00</span>
                    <button class="icon-btn" onclick="toggleFull(event)"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <section class="episodes-section">
        <h2 class="section-title">الحلقات المتوفرة</h2>
        <div class="episodes-grid">
            <div class="episode-card active" onclick="playEpisode(1, 'https://vid4.zvde-dsn-05.site/Al-Gabal-Al-Thalji/01.mp4')">
                <div class="episode-thumb"></div>
                <div class="episode-info"><div class="episode-title">الحلقة 1</div><div class="episode-status">متوفرة</div></div>
            </div>
            <div class="episode-card" onclick="playEpisode(2, 'https://vid1.zvde-dsn-05.site/Al-Gabal-Al-Thalji/02.mp4')">
                <div class="episode-thumb"></div>
                <div class="episode-info"><div class="episode-title">الحلقة 2</div><div class="episode-status">متوفرة</div></div>
            </div>
            <div class="episode-card" onclick="playEpisode(3, 'https://vid5.zvde-dsn-05.site/Al-Gabal-Al-Thalji/03.mp4')">
                <div class="episode-thumb"></div>
                <div class="episode-info"><div class="episode-title">الحلقة 3</div><div class="episode-status">متوفرة</div></div>
            </div>
            <div class="episode-card" style="opacity: 0.5; cursor: default;">
                <div class="episode-thumb" style="filter: grayscale(1);"></div>
                <div class="episode-info"><div class="episode-title">الحلقة 4</div><div style="color: #888;">قريباً</div></div>
            </div>
        </div>
    </section>

    <script>
        const video = document.getElementById('customVideo');
        const overlay = document.getElementById('controlsOverlay');
        const progressBar = document.getElementById('progressBar');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        let hideTimer;

        function handleVideoClick(e) {
            if (e.target.closest('button') || e.target.closest('input')) return;
            if (overlay.classList.contains('hide')) {
                showControls();
            } else {
                overlay.classList.add('hide');
                clearTimeout(hideTimer);
            }
        }

        function showControls() {
            overlay.classList.remove('hide');
            clearTimeout(hideTimer);
            if (!video.paused) {
                hideTimer = setTimeout(() => overlay.classList.add('hide'), 4000);
            }
        }

        function playEpisode(num, url) {
            document.getElementById('playerWrapper').style.display = 'block';
            document.getElementById('playerEpTitle').innerText = `الحلقة ${num}`;
            video.src = url;
            video.play();
            showControls();
            
            document.querySelectorAll('.episode-card').forEach((c, i) => {
                c.classList.toggle('active', i === num-1);
            });
            document.getElementById('playerWrapper').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function togglePlay(e) {
            e.stopPropagation();
            if (video.paused) video.play(); else video.pause();
            showControls();
        }

        function skip(time, e) {
            e.stopPropagation();
            video.currentTime += time;
            showControls();
        }

        function seek(e) {
            e.stopPropagation();
            video.currentTime = (progressBar.value / 100) * video.duration;
        }

        function toggleFull(e) {
            e.stopPropagation();
            if (!document.fullscreenElement) document.getElementById('videoContainer').requestFullscreen();
            else document.exitFullscreen();
        }

        video.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            showControls();
        });

        video.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            overlay.classList.remove('hide');
        });

        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const percent = (video.currentTime / video.duration) * 100;
            progressBar.value = percent;
            document.getElementById('currentTime').innerText = formatTime(video.currentTime);
            progressBar.style.background = `linear-gradient(to right, #E50914 ${percent}%, #333 ${percent}%)`;
        });

        video.addEventListener('loadedmetadata', () => {
            document.getElementById('durationTime').innerText = formatTime(video.duration);
        });

        function formatTime(sec) {
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }
    </script>
</body>
</html>
