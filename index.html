<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>beIN CONNECT Ultra Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .player-container {
            position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16/9; background: #000; direction: ltr;
        }

        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        /*   (Overlay) */
        .controls-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.8) 100%);
            opacity: 1; transition: opacity 0.4s ease; z-index: 10; padding: 20px;
        }
        .controls-overlay.hidden { opacity: 0; pointer-events: none; }

        /*     () */
        .tap-zone { position: absolute; top: 0; bottom: 0; width: 40%; z-index: 5; }
        .tap-zone.left { left: 0; }
        .tap-zone.right { right: 0; }
        .tap-indicator { 
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); color: #fff; padding: 15px 25px; border-radius: 50px;
            font-size: 14px; font-weight: bold; opacity: 0; transition: 0.2s; pointer-events: none;
        }
        .tap-zone.left .tap-indicator { left: 20%; }
        .tap-zone.right .tap-indicator { right: 20%; }
        .tap-indicator.show { opacity: 1; animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: translateY(-50%) scale(0.8); } 50% { transform: translateY(-50%) scale(1.1); } 100% { transform: translateY(-50%) scale(1); } }

        /*   */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; color: #fff; z-index: 11; }
        .top-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; }
        .back-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .channel-info h1 { font-size: 16px; font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px; }
        .live-tag { 
            display: inline-flex; align-items: center; gap: 5px; 
            background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #fff;
        }
        .live-tag::before { content: ''; width: 6px; height: 6px; background: #e50914; border-radius: 50%; box-shadow: 0 0 5px #e50914; }

        /*   */
        .mid-controls { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 60px; z-index: 11; }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; opacity: 0.9; transition: 0.2s; }
        .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }
        .ctrl-btn svg { width: 45px; height: 45px; fill: currentColor; }
        .play-pause-btn svg { width: 60px; height: 60px; }

        /*   */
        .bottom-bar { display: flex; flex-direction: column; gap: 15px; z-index: 11; }
        .progress-container { display: flex; align-items: center; gap: 15px; color: #fff; font-size: 12px; font-weight: 500; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-filled { height: 100%; background: #eb1536; /*  /   */ width: 0%; border-radius: 2px; position: relative; pointer-events: none; }
        .progress-filled::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; background: #eb1536; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .tools-bar { display: flex; justify-content: space-between; align-items: center; color: #fff; padding: 0 5px; }
        .tools-left, .tools-right { display: flex; align-items: center; gap: 25px; }
        .tool-btn { background: none; border: none; color: #fff; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .tool-btn:hover { opacity: 1; color: #eb1536; }
        .tool-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /*    */
        .quality-menu {
            position: absolute; bottom: 70px; right: 20px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px;
            display: none; flex-direction: column; z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 130px;
        }
        .quality-menu.show { display: flex; }
        .q-item { background: none; border: none; color: #ccc; padding: 10px 15px; text-align: left; cursor: pointer; font-size: 13px; font-weight: bold; border-radius: 6px; transition: 0.2s; }
        .q-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .q-item.active { background: rgba(235, 21, 54, 0.2); color: #eb1536; }

    </style>
</head>
<body>

            </button>
            <button class="ctrl-btn play-pause-btn" id="playBtn" onclick="togglePlay()">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="skip(10)">
                <svg viewBox="0 0 24 24"><path d="M4 13c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8v-4l5 5-5 5v-4c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8-3.58-8-8-8h2zM10.9 16h-.85v-3.26l-1.01.31v-.69l1.77-.63h.09V16zm4.28-1.76c0 .32-.03.6-.1.82s-.17.42-.29.57-.28.26-.45.33-.37.1-.59.1-.41-.03-.59-.1-.33-.18-.46-.33-.23-.34-.3-.57-.11-.5-.11-.82v-.74c0-.32.03-.6.1-.82s.17-.42.29-.57.28-.26.45-.33.37-.1.59-.1.41.03.59.1.33.18.46.33.23.34.3.57.11.5.11.82v.74zm-.85-.86c0-.19-.01-.35-.04-.48s-.07-.23-.12-.31-.11-.14-.19-.17-.16-.05-.25-.05-.18.02-.25.05-.14.09-.19.17-.09.18-.12.31-.04.29-.04.48v.97c0 .19.01.35.04.48s.07.24.12.32.11.14.19.17.16.04.25.04.18-.01.25-.04.14-.09.19-.17.09-.19.11-.32.04-.29.04-.48v-.97z"/></svg>
            </button>
        </div>

        <div class="bottom-bar">
            <div class="progress-container">
                <span id="currentTime">00:00</span>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <span id="durationTime">00:00</span>
            </div>
            <div class="tools-bar">
                <div class="tools-left">
                    <button class="tool-btn"><svg viewBox="0 0 24 24"><path d="M4 18h16c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2zM4 6h16v10H4V6zm2 6h2v2H6v-2zm4 0h6v2h-6v-2z"/></svg></button>

                <div class="tools-right">
                    <button class="tool-btn" id="settingsBtn" onclick="toggleSettings(event)">
                        <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98 0-.34-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                    </button>
                    <button class="tool-btn" onclick="toggleFullScreen()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                </div>
            </div>
        </div>

        <div class="quality-menu" id="qMenu">
            <button class="q-item active" onclick="changeStream('https://a4.kora-plus.dad/watch/b1.m3u8', this)">1080p FHD</button>
            <button class="q-item" onclick="changeStream('https://a4.kora-plus.dad/watch/b1.m3u8', this)">720p HD</button>
            <button class="q-item" onclick="changeStream('https://a4.kora-plus.dad/watch/b1.m3u8', this)">480p SD</button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('videoElement');
    const overlay = document.getElementById('controlsOverlay');
    const progressFilled = document.getElementById('progressFilled');
    const qMenu = document.getElementById('qMenu');
    let hls = null;

    //  
    function initStream(url) {
        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls({ lowLatencyMode: true });
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/x-mpegURL')) {
            video.src = url;
        }
    }
    initStream('https://a4.kora-plus.dad/watch/b1.m3u8'); //  

    //  
    function togglePlay() {
        if (video.paused) { video.play(); document.getElementById('playIcon').style.display = 'none'; document.getElementById('pauseIcon').style.display = 'block'; }
        else { video.pause(); document.getElementById('playIcon').style.display = 'block'; document.getElementById('pauseIcon').style.display = 'none'; }
    }

    //     
    function skip(time) {
        video.currentTime += time;
        if(time > 0) showIndicator('indRight');
        else showIndicator('indLeft');
    }

    function showIndicator(id) {
        const ind = document.getElementById(id);
        ind.classList.remove('show');
        void ind.offsetWidth; //   
        ind.classList.add('show');
    }

    //    
    let lastTap = 0;
    function handleTap(e, time) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
            skip(time);
            e.preventDefault();
        } else {
            //    
            resetHideTimer();
        }
        lastTap = currentTime;
    }
    document.getElementById('tapLeft').addEventListener('touchstart', (e) => handleTap(e, -10));
    document.getElementById('tapRight').addEventListener('touchstart', (e) => handleTap(e, 10));

    //    
    video.addEventListener('timeupdate', () => {
        const percent = (video.currentTime / video.duration) * 100;
        progressFilled.style.width = `${percent}%`;
        document.getElementById('currentTime').textContent = formatTime(video.currentTime);
        if(video.duration) document.getElementById('durationTime').textContent = formatTime(video.duration);
    });

    //    
    function seek(e) {
        const rect = document.getElementById('progressBar').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    }

    //  +    (Landscape Lock)
    async function toggleFullScreen() {
        const container = document.getElementById('playerContainer');
        if (!document.fullscreenElement) {
            await container.requestFullscreen().catch(err => {});
            try { await screen.orientation.lock('landscape'); } catch (e) {} //    
        } else {
            document.exitFullscreen();
            try { screen.orientation.unlock(); } catch (e) {}
        }
    }

    //   
    function toggleSettings(e) { e.stopPropagation(); qMenu.classList.toggle('show'); }
    document.addEventListener('click', (e) => { if(!e.target.closest('#settingsBtn')) qMenu.classList.remove('show'); });

    function changeStream(url, btn) {
        document.querySelectorAll('.q-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
        const currTime = video.currentTime;
        initStream(url);
        video.addEventListener('loadedmetadata', function onLoaded() {
            video.currentTime = currTime;
            video.play();
            video.removeEventListener('loadedmetadata', onLoaded);
        });
    }

    function formatTime(seconds) {
        let m = Math.floor(seconds / 60);
        let s = Math.floor(seconds % 60);
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    //   
    let hideTimeout;
    function resetHideTimer() {
        overlay.classList.remove('hidden');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => { if (!video.paused) overlay.classList.add('hidden'); }, 3500);
    }
    overlay.addEventListener('mousemove', resetHideTimer);
    overlay.addEventListener('click', resetHideTimer);
    video.addEventListener('play', resetHideTimer);
</script>

</body>
</html>
