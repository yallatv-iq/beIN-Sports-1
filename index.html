<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-PRO MAX</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --main: #00d2ff; --bg: #05070a; --side: #0d1117; }
        body { background: var(--bg); color: white; font-family: Cairo; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: var(--side); border-left: 1px solid #222; display: flex; flex-direction: column; }
        .header { padding: 20px; text-align: center; font-weight: bold; color: var(--main); border-bottom: 2px solid var(--main); font-size: 20px; }
        .search { padding: 10px; }
        .search input { width: 90%; padding: 10px; border-radius: 8px; border: none; background: #1c2128; color: white; outline: 2px solid #333; }
        .list { flex: 1; overflow-y: auto; padding: 10px; }
        .item { padding: 12px; background: #161b22; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; border: 1px solid transparent; }
        .item:hover { border-color: var(--main); background: #1c2128; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        video { width: 95%; max-width: 900px; border-radius: 12px; box-shadow: 0 0 20px var(--main); }
        #loading { padding: 20px; text-align: center; color: var(--main); }
        @media (max-width: 700px) { body { flex-direction: column; } .sidebar { width: 100%; height: 40%; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="header">XLION PREMIUM</div>
    <div class="search"><input type="text" id="find" placeholder="بحث عن قناة..." onkeyup="searchCh()"></div>
    <div id="loading">جاري محاولة الاتصال...</div>
    <div class="list" id="list"></div>
</div>

<div class="main">
    <video id="vid" controls autoplay playsinline></video>
    <h3 id="target">اختر قناة للبدء</h3>
</div>

<script>
    const video = document.getElementById('vid');
    let channels = [];

    // سطر جلب البيانات باستخدام وسيط يكسر CORS تماماً
    async function loadData() {
        const targetUrl = "http://xlion.net:8080/player_api.php?username=hamdiusa2022&password=simosaid01&action=get_live_streams";
        const proxyUrl = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(targetUrl);

        try {
            const res = await fetch(proxyUrl);
            channels = await res.json();
            show(channels);
            document.getElementById('loading').style.display = 'none';
        } catch (err) {
            document.getElementById('loading').innerText = "فشل في جلب القنوات، يرجى تحديث الصفحة";
        }
    }

    function show(data) {
        const container = document.getElementById('list');
        container.innerHTML = '';
        data.forEach(ch => {
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<span>▶</span> ${ch.name}`;
            d.onclick = () => play(ch.stream_id, ch.name, ch.container_extension);
            container.appendChild(d);
        });
    }

    function play(id, name, ext) {
        document.getElementById('target').innerText = "بث مباشر: " + name;
        // رابط البث المباشر
        const stream = `http://xlion.net:8080/live/hamdiusa2022/simosaid01/${id}.${ext || 'ts'}`;

        if (Hls.isSupported()) {
            const hls = new Hls();
            // استخدام بروكسي للبث أيضاً لضمان التشغيل على GitHub
            hls.loadSource("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(stream));
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = stream;
        }
    }

    function searchCh() {
        const query = document.getElementById('find').value.toLowerCase();
        show(channels.filter(c => c.name.toLowerCase().includes(query)));
    }

    loadData();
</script>
</body>
</html>
