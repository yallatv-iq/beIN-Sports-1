<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة العرض - بث مباشر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-dark: #0b0c10;
            --neon-blue: #00ffff;
            --neon-coral: #ff7f50;
            --surface: #1f2833;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cinematic-player {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .player-header {
            background: var(--surface);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-coral);
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-blue);
            margin: 0;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            outline: none;
            display: block;
        }

        .controls-container {
            padding: 20px;
            background: var(--bg-dark);
            text-align: center;
        }

        .play-btn {
            background-color: var(--neon-coral);
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 127, 80, 0.3);
        }

        .play-btn:hover {
            background-color: #e06c42;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 127, 80, 0.5);
        }

        .status-text {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="cinematic-player">
        <div class="player-header">
            <h2 class="channel-name" id="channelTitle">بين سبورت 1</h2>
        </div>
        
        <video id="videoPlayer" controls preload="auto"></video>
        
        <div class="controls-container">
            <button class="play-btn" onclick="startStream()">تشغيل</button>
            <div class="status-text" id="statusMsg">في انتظار التشغيل...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const statusMsg = document.getElementById('statusMsg');
        
        // الرابط المجرد الذي التقطته
        const originalM3u8 = "http://het000.4rouwanda-shop.store/live/918454578001/index.m3u8";
        
        // توجيه الرابط ليمر عبر السيرفر الخاص بنا لحقن البصمة
        const proxyUrl = `/api/stream?url=${encodeURIComponent(originalM3u8)}`;

        function startStream() {
            statusMsg.innerText = "جاري الاتصال وحقن البصمة...";
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(proxyUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    statusMsg.innerText = "تم تخطي الحماية. البث يعمل الآن.";
                    statusMsg.style.color = "#00ffff";
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        statusMsg.innerText = "فشل الاتصال. السيرفر الأصلي رفض الطلب.";
                        statusMsg.style.color = "#ff7f50";
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxyUrl;
                video.play();
                statusMsg.innerText = "البث يعمل الآن.";
            }
        }
    </script>
</body>
</html>

    <div class="terminal" id="terminal">
        <span>[System]: Player is ready. Waiting for commands...</span>
    </div>

    <script>
        const player = videojs('smart-player', { autoplay: true });
        const terminal = document.getElementById('terminal');

        function logMsg(msg, type = 'normal') {
            const span = document.createElement('span');
            span.innerHTML = `> ${msg}`;
            if (type === 'error') span.className = 'log-error';
            if (type === 'success') span.className = 'log-success';
            terminal.appendChild(span);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function extractStreamLink(data) {
            const possibleKeys = ['url', 'stream_url', 'link', 'source', 'm3u8_url', 'video'];
            for (let key of possibleKeys) {
                if (data[key]) return data[key];
            }
            return null;
        }

        async function processChannel(apiUrl, channelName) {
            logMsg(`[Request] Connecting to proxy for: ${channelName}...`);
            try {
                // الاتصال بملف السيرفر المصغر الخاص بك
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Proxy Server Error');
                
                const data = await response.json();
                logMsg(`[Success] Data received from bypass server.`, 'success');
                
                const streamUrl = extractStreamLink(data);
                if (streamUrl) {
                    logMsg(`[Extracted] Stream URL: ${streamUrl}`);
                    logMsg(`[Action] Playing video...`, 'success');
                    player.src({
                        src: streamUrl,
                        type: streamUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'
                    });
                    player.play();
                } else {
                    logMsg(`[Error] Link found, but stream url is missing inside data.`, 'error');
                }
            } catch (error) {
                logMsg(`[Error] ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
